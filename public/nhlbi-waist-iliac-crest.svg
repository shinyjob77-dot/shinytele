<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">NHLBI waist circumference measurement at the iliac crest</title>
  <desc id="desc">Illustration showing the tape measure positioned horizontally around the abdomen at the level of the right iliac crest.</desc>
  <rect width="980" height="560" rx="28" fill="#f7faf8"/>
  <rect x="36" y="36" width="908" height="488" rx="24" fill="#ffffff" stroke="#d7e5e2" stroke-width="3"/>
  <text x="70" y="90" fill="#10201f" font-family="Arial, sans-serif" font-size="32" font-weight="700">NHLBI waist circumference method</text>
  <text x="70" y="126" fill="#53615f" font-family="Arial, sans-serif" font-size="18">Measure in a horizontal plane at the level of the uppermost border of the iliac crest.</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#26736c"/>
    </marker>
  </defs>
  <g transform="translate(84 138)">
    <path d="M205 58c0 40-29 72-65 72S75 98 75 58 104 0 140 0s65 18 65 58Z" fill="#f4c7a1"/>
    <path d="M92 140c-30 22-49 61-54 116L18 438h244l-20-182c-5-55-24-94-54-116-15 14-31 21-48 21s-33-7-48-21Z" fill="#d7e5e2"/>
    <path d="M40 260c-31 42-42 88-28 140l34-2 30-139-36 1Z" fill="#f4c7a1"/>
    <path d="M240 260c31 42 42 88 28 140l-34-2-30-139 36 1Z" fill="#f4c7a1"/>
    <path d="M83 306c36 14 78 14 114 0" fill="none" stroke="#10201f" stroke-width="4" stroke-dasharray="10 8" stroke-linecap="round"/>
    <rect x="54" y="291" width="172" height="29" rx="14.5" fill="none" stroke="#ef7c5b" stroke-width="8"/>
    <path d="M88 278l-20 58" stroke="#26736c" stroke-width="7" stroke-linecap="round"/>
    <path d="M192 278l20 58" stroke="#26736c" stroke-width="7" stroke-linecap="round"/>
    <circle cx="208" cy="306" r="9" fill="#26736c"/>
    <path d="M208 306 C280 300 315 266 342 224" fill="none" stroke="#26736c" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
    <text x="308" y="215" fill="#10201f" font-family="Arial, sans-serif" font-size="18" font-weight="700">Right iliac crest</text>
    <text x="74" y="313" fill="#10201f" font-family="Arial, sans-serif" font-size="12" font-weight="700">TAPE PARALLEL TO FLOOR</text>
    <path d="M82 438h116" stroke="#d7e5e2" stroke-width="12" stroke-linecap="round"/>
  </g>
  <g transform="translate(450 158)" font-family="Arial, sans-serif">
    <g>
      <circle cx="22" cy="22" r="22" fill="#26736c"/>
      <text x="16" y="30" fill="#ffffff" font-size="24" font-weight="700">1</text>
      <text x="62" y="17" fill="#10201f" font-size="22" font-weight="700">Locate the right iliac crest</text>
      <text x="62" y="48" fill="#53615f" font-size="18">Find the upper hip bone and top of the right iliac crest.</text>
    </g>
    <g transform="translate(0 105)">
      <circle cx="22" cy="22" r="22" fill="#26736c"/>
      <text x="16" y="30" fill="#ffffff" font-size="24" font-weight="700">2</text>
      <text x="62" y="17" fill="#10201f" font-size="22" font-weight="700">Place tape at iliac crest level</text>
      <text x="62" y="48" fill="#53615f" font-size="18">Keep the tape horizontal and parallel to the floor.</text>
    </g>
    <g transform="translate(0 210)">
      <circle cx="22" cy="22" r="22" fill="#26736c"/>
      <text x="16" y="30" fill="#ffffff" font-size="24" font-weight="700">3</text>
      <text x="62" y="17" fill="#10201f" font-size="22" font-weight="700">Read at end-expiration</text>
      <text x="62" y="48" fill="#53615f" font-size="18">Tape is snug but does not compress the skin.</text>
    </g>
  </g>
  <rect x="70" y="475" width="840" height="1" fill="#d7e5e2"/>
  <text x="70" y="506" fill="#53615f" font-family="Arial, sans-serif" font-size="15">Source: National Heart, Lung, and Blood Institute / NIH Practical Guide, waist circumference at the iliac crest.</text>
</svg>
