<svg xmlns="http://www.w3.org/2000/svg" width="720" height="216" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">TeleDNPnow Logo</title>
  <desc id="desc">TeleDNPnow logo with stethoscope icon and small TeleDNPnow text.</desc>
  <defs>
    <style>
      .navy { fill: #08284c; }
      .teal { fill: #17a99c; }
      .navy-stroke {
        fill: none;
        stroke: #08284c;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 17;
      }
      .teal-stroke {
        fill: none;
        stroke: #17a99c;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 17;
      }
      .wordmark {
        font-family: "Montserrat", "Aptos Display", "Segoe UI", Arial, sans-serif;
        font-size: 108px;
        font-weight: 800;
        letter-spacing: -2px;
      }
      .tagline {
        fill: #08284c;
        font-family: "Montserrat", "Segoe UI", Arial, sans-serif;
        font-size: 30px;
        font-weight: 800;
        letter-spacing: 4px;
      }
    </style>
  </defs>

  <rect width="1200" height="360" fill="#ffffff"/>

  <g transform="translate(70 58)">
    <path class="navy-stroke" d="M45 18v86c0 52 42 94 94 94s94-42 94-94V18"/>
    <circle class="navy" cx="45" cy="18" r="13"/>
    <circle class="navy" cx="233" cy="18" r="13"/>
    <path class="navy-stroke" d="M139 198v28c0 32 26 58 58 58s58-26 58-58v-39"/>
    <circle class="navy-stroke" cx="255" cy="168" r="36"/>
    <path class="teal-stroke" d="M282 75h45c32 0 58 26 58 58v45c0 32-26 58-58 58h-45"/>
    <path class="teal-stroke" d="M282 75h-45c-32 0-58 26-58 58v45c0 32 26 58 58 58h45"/>
  </g>

  <g transform="translate(350 143)">
    <text class="wordmark" x="0" y="0">
      <tspan class="navy">Tele</tspan><tspan class="teal">DNP</tspan><tspan class="navy">now</tspan>
    </text>
    <text class="tagline" x="4" y="70">TeleDNPnow.</text>
  </g>
