<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 1024" role="img" aria-labelledby="title desc">
  <title id="title">Request a Telemedicine Appointment</title>
  <desc id="desc">A telemedicine appointment booking graphic with appointment steps and a laptop calendar.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.58" stop-color="#eef5f4"/>
      <stop offset="1" stop-color="#dce9e7"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5f8fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#10201f" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1536" height="1024" fill="url(#bg)"/>
  <circle cx="1310" cy="155" r="118" fill="#d9e8e5"/>
  <circle cx="1395" cy="245" r="70" fill="#c8dedb"/>
  <rect x="950" y="760" width="390" height="150" rx="75" fill="#d2e1de"/>
  <rect x="88" y="80" width="500" height="740" rx="28" fill="#ffffff" opacity="0.72"/>
  <text x="84" y="126" fill="#063873" font-family="Inter, Arial, sans-serif" font-size="78" font-weight="800">
    <tspan x="84" dy="0">Request a</tspan>
    <tspan x="84" dy="92">Telemedicine</tspan>
    <tspan x="84" dy="92">Appointment</tspan>
  </text>
  <text x="88" y="370" fill="#10201f" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="500">
    <tspan x="88" dy="0">Quality care from the</tspan>
    <tspan x="88" dy="48">comfort of your home.</tspan>
  </text>
  <g font-family="Inter, Arial, sans-serif" fill="#10201f" font-size="33" font-weight="600">
    <g transform="translate(90 515)">
      <circle cx="48" cy="48" r="48" fill="#063873"/>
      <rect x="25" y="31" width="46" height="42" rx="5" fill="none" stroke="#ffffff" stroke-width="5"/>
      <path d="M25 43h46M36 24v15M60 24v15" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
      <text x="128" y="38">Choose Date</text>
      <text x="128" y="80">&amp; Time</text>
    </g>
    <g transform="translate(90 655)">
      <circle cx="48" cy="48" r="48" fill="#063873"/>
      <circle cx="48" cy="36" r="17" fill="none" stroke="#ffffff" stroke-width="5"/>
      <path d="M20 76c6-24 49-24 56 0" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
      <text x="128" y="38">Provide Your</text>
      <text x="128" y="80">Information</text>
    </g>
    <g transform="translate(90 795)">
      <circle cx="48" cy="48" r="48" fill="#063873"/>
      <path d="m22 50 21 22 36-46" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M80 64a35 35 0 1 1-8-39" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
      <text x="128" y="38">Get Confirmation</text>
      <text x="128" y="80">&amp; Join Your Visit</text>
    </g>
  </g>
  <g filter="url(#shadow)" transform="translate(610 180) rotate(-5 380 300)">
    <rect x="0" y="0" width="720" height="520" rx="32" fill="#1d242b"/>
    <rect x="34" y="34" width="652" height="420" rx="14" fill="url(#screen)"/>
    <rect x="130" y="470" width="530" height="60" rx="18" fill="#2c333a"/>
    <text x="235" y="98" fill="#063873" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">Request an Appointment</text>
    <g font-family="Inter, Arial, sans-serif" font-size="14" fill="#10201f">
      <circle cx="170" cy="155" r="19" fill="#ffffff" stroke="#cdd6dc" stroke-width="2"/>
      <path d="m160 154 8 8 15-18" fill="none" stroke="#063873" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="120" y="202">1. Choose Provider</text>
      <circle cx="365" cy="155" r="21" fill="#063873"/>
      <path d="M355 148h20v20h-20zM355 155h20M361 142v9M370 142v9" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <text x="305" y="202">2. Select Date &amp; Time</text>
      <circle cx="555" cy="155" r="19" fill="#ffffff" stroke="#cdd6dc" stroke-width="2"/>
      <circle cx="555" cy="148" r="6" fill="none" stroke="#9aa9b2" stroke-width="2"/>
      <path d="M541 166c4-16 24-16 28 0" fill="none" stroke="#9aa9b2" stroke-width="2"/>
      <text x="510" y="202">3. Your Information</text>
    </g>
    <rect x="100" y="245" width="350" height="205" rx="12" fill="#ffffff" stroke="#e1e7eb"/>
    <text x="130" y="285" fill="#10201f" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Select Date</text>
    <text x="245" y="320" fill="#10201f" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">May 2026</text>
    <g font-family="Inter, Arial, sans-serif" font-size="16" fill="#10201f" text-anchor="middle">
      <text x="150" y="360">SUN</text><text x="195" y="360">MON</text><text x="240" y="360">TUE</text><text x="285" y="360">WED</text><text x="330" y="360">THU</text><text x="375" y="360">FRI</text><text x="420" y="360">SAT</text>
      <text x="150" y="395">3</text><text x="195" y="395">4</text><text x="240" y="395">5</text><text x="285" y="395">6</text><text x="330" y="395">7</text><text x="375" y="395">8</text><text x="420" y="395">9</text>
      <circle cx="285" cy="425" r="19" fill="#0a4fa8"/><text x="285" y="431" fill="#ffffff">13</text>
      <text x="330" y="431">14</text><text x="375" y="431">15</text><text x="420" y="431">16</text>
    </g>
    <rect x="480" y="235" width="150" height="230" rx="12" fill="#ffffff" stroke="#e1e7eb"/>
    <text x="500" y="275" fill="#10201f" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Available Times</text>
    <g font-family="Inter, Arial, sans-serif" font-size="16" text-anchor="middle">
      <rect x="505" y="300" width="104" height="34" rx="6" fill="#ffffff" stroke="#ced8df"/>
      <text x="557" y="323" fill="#063873">9:00 AM</text>
      <rect x="505" y="348" width="104" height="38" rx="6" fill="#063873"/>
      <text x="557" y="373" fill="#ffffff">10:30 AM</text>
      <rect x="505" y="400" width="104" height="34" rx="6" fill="#ffffff" stroke="#ced8df"/>
      <text x="557" y="423" fill="#063873">1:00 PM</text>
    </g>
  </g>
</svg>
