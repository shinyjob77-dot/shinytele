<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">How to measure waist circumference</title>
  <desc id="desc">Illustration showing a tape measure wrapped level around the waist, with posture and breathing reminders.</desc>
  <rect width="980" height="560" rx="28" fill="#f7faf8"/>
  <rect x="36" y="36" width="908" height="488" rx="24" fill="#ffffff" stroke="#d7e5e2" stroke-width="3"/>
  <text x="70" y="92" fill="#10201f" font-family="Arial, sans-serif" font-size="34" font-weight="700">How to measure waist circumference</text>
  <text x="70" y="128" fill="#53615f" font-family="Arial, sans-serif" font-size="18">Stand upright. Keep the tape level. Measure after a normal breath out.</text>

  <g transform="translate(110 142)">
    <path d="M190 56c0 38-27 68-61 68S68 94 68 56 95 0 129 0s61 18 61 56Z" fill="#f4c7a1"/>
    <path d="M82 138c-28 20-45 56-49 107l-18 190h228l-18-190c-5-51-22-87-49-107-15 13-30 20-47 20s-32-7-47-20Z" fill="#d7e5e2"/>
    <path d="M33 245c-31 38-43 85-30 141l35-3 30-139-35 1Z" fill="#f4c7a1"/>
    <path d="M225 245c31 38 43 85 30 141l-35-3-30-139 35 1Z" fill="#f4c7a1"/>
    <path d="M74 238c35 17 75 17 110 0" fill="none" stroke="#26736c" stroke-width="16" stroke-linecap="round"/>
    <path d="M58 238c45 34 97 34 142 0" fill="none" stroke="#10201f" stroke-width="4" stroke-dasharray="10 8" stroke-linecap="round"/>
    <rect x="43" y="226" width="172" height="26" rx="13" fill="none" stroke="#ef7c5b" stroke-width="7"/>
    <g fill="#10201f" font-family="Arial, sans-serif" font-size="12" font-weight="700">
      <text x="67" y="244">TAPE LEVEL</text>
      <text x="145" y="244">WAIST</text>
    </g>
    <path d="M76 426h106" stroke="#d7e5e2" stroke-width="12" stroke-linecap="round"/>
  </g>

  <g transform="translate(430 158)" font-family="Arial, sans-serif">
    <g>
      <circle cx="22" cy="22" r="22" fill="#26736c"/>
      <text x="16" y="30" fill="#ffffff" font-size="24" font-weight="700">1</text>
      <text x="62" y="17" fill="#10201f" font-size="22" font-weight="700">Place the tape at waist level</text>
      <text x="62" y="48" fill="#53615f" font-size="18">Wrap it around the abdomen, keeping it level front and back.</text>
    </g>
    <g transform="translate(0 105)">
      <circle cx="22" cy="22" r="22" fill="#26736c"/>
      <text x="16" y="30" fill="#ffffff" font-size="24" font-weight="700">2</text>
      <text x="62" y="17" fill="#10201f" font-size="22" font-weight="700">Do not pull tight</text>
      <text x="62" y="48" fill="#53615f" font-size="18">The tape should touch the skin or clothing without compressing.</text>
    </g>
    <g transform="translate(0 210)">
      <circle cx="22" cy="22" r="22" fill="#26736c"/>
      <text x="16" y="30" fill="#ffffff" font-size="24" font-weight="700">3</text>
      <text x="62" y="17" fill="#10201f" font-size="22" font-weight="700">Record after breathing out</text>
      <text x="62" y="48" fill="#53615f" font-size="18">Take the measurement after a normal breath out.</text>
    </g>
  </g>

  <rect x="70" y="475" width="840" height="1" fill="#d7e5e2"/>
  <text x="70" y="506" fill="#53615f" font-family="Arial, sans-serif" font-size="15">Reference: National Health Survey 2017-18 methodology, released 2018. Illustration created for TeleDNP Now.</text>
</svg>
